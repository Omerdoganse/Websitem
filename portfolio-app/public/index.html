<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Portfolyom | Full-Stack Geliştirici</title>
    <meta name="description"
        content="Modern Full-Stack Geliştirici portfolyosu. Yeteneklerim, projelerim ve hakkımda daha fazla bilgi edinin.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="#" class="logo">Portfolyo<span>.</span></a>
            <ul class="nav-links">
                <li><a href="#hero">Ana Sayfa</a></li>
                <li><a href="#about">Hakkımda</a></li>
                <li><a href="#skills">Yetenekler</a></li>
                <li><a href="#projects">Projeler</a></li>
                <li><a href="#contact">İletişim</a></li>
                <li><a href="/admin/login.html" class="nav-btn">Admin</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero section">
        <div class="container hero-content">
            <h1 class="hero-title">Merhaba, Ben <span class="highlight-blue">Ömer</span></h1>
            <p class="hero-subtitle">Modern <span class="highlight-green">Full-Stack</span> Web Geliştiricisi</p>
            <div class="social-links">
                <a href="https://linkedin.com" target="_blank" class="social-icon"><i
                        class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/omerdgn" target="_blank" class="social-icon"><i
                        class="fab fa-github"></i></a>
            </div>
            <a href="#projects" class="btn btn-primary">Projelerimi Gör</a>
        </div>
        <div class="blob-shape"></div>
    </section>

    <!-- About Section -->
    <section id="about" class="about section">
        <div class="container">
            <h2 class="section-title">Hakkımda</h2>
            <div class="glass-card about-card">
                <p id="about-text">Yükleniyor...</p>
            </div>
        </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="skills section">
        <div class="container">
            <h2 class="section-title">Yeteneklerim</h2>
            <div class="skills-grid" id="skills-grid">
                <!-- Skills injected by JS -->
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="projects section">
        <div class="container">
            <h2 class="section-title">Projelerim</h2>
            <div class="projects-grid" id="projects-grid">
                <!-- Projects injected by JS -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact section">
        <div class="container">
            <h2 class="section-title">Bana Ulaşın</h2>
            <div class="glass-card contact-card">
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="name">İsim</label>
                        <input type="text" id="name" name="name" required placeholder="Adınız Soyadınız">
                    </div>
                    <div class="form-group">
                        <label for="email">E-posta</label>
                        <input type="email" id="email" name="email" required placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Mesaj</label>
                        <textarea id="message" name="message" rows="5" required
                            placeholder="Mesajınızı buraya yazın..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-submit">Gönder</button>
                    <p id="form-status" class="form-status"></p>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Portfolyo. Tüm Hakları Saklıdır.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
</body>

</html>
